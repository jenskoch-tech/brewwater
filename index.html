<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrewWater AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f8;
margin:0;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

label{
font-size:14px;
}

input,select{
width:100%;
padding:6px;
margin-top:3px;
}

button{
background:#2f7d32;
color:white;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#27682a;
}

.result{
background:#eef7ff;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.warning{
color:#b00020;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>BrewWater AI</h1>

<div class="card">

<h3>Water Profile</h3>

<label>Water Preset</label>
<select id="preset">
<option value="">Custom</option>
<option value="ro">Reverse Osmosis (0 minerals)</option>
<option value="pilsen">Pilsen Water</option>
<option value="london">London Water</option>
<option value="burton">Burton-on-Trent</option>
</select>

<div class="grid">

<label>Calcium (Ca ppm)
<input id="ca" type="number">
</label>

<label>Magnesium (Mg ppm)
<input id="mg" type="number">
</label>

<label>Sodium (Na ppm)
<input id="na" type="number">
</label>

<label>Chloride (Cl ppm)
<input id="cl" type="number">
</label>

<label>Sulfate (SO4 ppm)
<input id="so4" type="number">
</label>

<label>Bicarbonate (HCO3 ppm)
<input id="hco3" type="number">
</label>

</div>

</div>


<div class="card">

<h3>Beer Style</h3>

<select id="style">
<option value="ipa">IPA</option>
<option value="neipa">NEIPA</option>
<option value="pilsner">Pilsner</option>
<option value="lager">Lager</option>
<option value="stout">Stout</option>
<option value="porter">Porter</option>
<option value="amber">Amber Ale</option>
<option value="helles">Helles</option>
<option value="marzen">Märzen</option>
<option value="wheat">Wheat Beer</option>
</select>

<label>Batch Size (Liters)</label>
<input id="batch" type="number" value="20">

</div>


<div class="card">

<button onclick="calculate()">Calculate Brewing Water</button>

</div>


<div class="card">

<h3>Results</h3>

<div id="results"></div>

</div>


<div class="card">

<h3>AI Water Report Scanner</h3>

<input type="file" id="file">

<label>Gemini API Key</label>
<input id="apikey" placeholder="Paste Gemini API key">

<div class="warning">
Your API key is stored only in your browser and never uploaded anywhere else.
</div>

<button onclick="scan()">Scan Water Report</button>

</div>

</div>


<script>

const presets={

ro:{ca:0,mg:0,na:0,cl:0,so4:0,hco3:0},

pilsen:{ca:7,mg:2,na:2,cl:5,so4:5,hco3:15},

london:{ca:90,mg:5,na:15,cl:40,so4:60,hco3:180},

burton:{ca:270,mg:40,na:25,cl:35,so4:640,hco3:300}

}


const styles={

ipa:{ca:120,so4:250,cl:60,hco3:50},

neipa:{ca:100,so4:80,cl:150,hco3:40},

pilsner:{ca:50,so4:60,cl:50,hco3:30},

lager:{ca:60,so4:70,cl:60,hco3:40},

stout:{ca:70,so4:50,cl:70,hco3:200},

porter:{ca:80,so4:60,cl:70,hco3:180},

amber:{ca:90,so4:90,cl:80,hco3:120},

helles:{ca:40,so4:40,cl:50,hco3:40},

marzen:{ca:70,so4:80,cl:70,hco3:100},

wheat:{ca:50,so4:40,cl:60,hco3:40}

}


document.getElementById("preset").addEventListener("change",function(){

let p=this.value

if(presets[p]){

for(let key in presets[p]){
document.getElementById(key).value=presets[p][key]
}

}

})


function calculate(){

let ca=parseFloat(caInput("ca"))
let mg=parseFloat(caInput("mg"))
let na=parseFloat(caInput("na"))
let cl=parseFloat(caInput("cl"))
let so4=parseFloat(caInput("so4"))
let hco3=parseFloat(caInput("hco3"))

let batch=parseFloat(document.getElementById("batch").value)

let style=document.getElementById("style").value

let target=styles[style]

let scale=batch/10


let gypsum=0
let cacl2=0
let epsom=0
let baking=0
let chalk=0


if(target.so4>target.cl){

let diff=target.so4-so4
gypsum=(diff/147.4)*scale
so4+=diff
ca+=gypsum*61.5

}else{

let diff=target.cl-cl
cacl2=(diff/127)*scale
cl+=diff
ca+=cacl2*72

}


if(target.ca && ca<target.ca){

let add=(target.ca-ca)/72
cacl2+=add
ca=target.ca

}


if(target.hco3 && hco3<target.hco3){

let diff=target.hco3-hco3
baking=(diff/191)*scale
hco3+=diff
na+=baking*72

}


let ra=hco3-(ca/3.5+mg/7)

let ratio=so4/cl


let insight=""

if(ratio>2) insight="Hop-forward profile"
else if(ratio<1) insight="Malt-forward profile"
else insight="Balanced profile"


let raInsight=""

if(ra<0) raInsight="Good for pale beers"
else if(ra<100) raInsight="Balanced profile"
else raInsight="Better suited to dark beers"


document.getElementById("results").innerHTML=`

<div class="result">
Gypsum: ${gypsum.toFixed(2)} g
</div>

<div class="result">
Calcium Chloride: ${cacl2.toFixed(2)} g
</div>

<div class="result">
Baking Soda: ${baking.toFixed(2)} g
</div>

<div class="result">
Residual Alkalinity: ${ra.toFixed(1)} (${raInsight})
</div>

<div class="result">
Sulfate/Chloride Ratio: ${ratio.toFixed(2)} (${insight})
</div>

`

}


function caInput(id){
return document.getElementById(id).value||0
}


async function scan(){

let file=document.getElementById("file").files[0]

let key=document.getElementById("apikey").value

if(!file||!key){
alert("Upload file and API key")
return
}

let reader=new FileReader()

reader.onload=async function(){

let base64=reader.result.split(",")[1]

let prompt=`Extract brewing water chemistry values and return JSON:

{
calcium,
magnesium,
sodium,
chloride,
sulfate,
bicarbonate
}`

let res=await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{
parts:[
{text:prompt},
{inlineData:{
mimeType:file.type,
data:base64
}}
]
}]

})

}

)

let data=await res.json()

let text=data.candidates[0].content.parts[0].text

let json=JSON.parse(text)

document.getElementById("ca").value=json.calcium
document.getElementById("mg").value=json.magnesium
document.getElementById("na").value=json.sodium
document.getElementById("cl").value=json.chloride
document.getElementById("so4").value=json.sulfate
document.getElementById("hco3").value=json.bicarbonate

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
